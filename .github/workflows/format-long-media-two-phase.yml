name: Format long media two phase

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx prettier --write src/routes/app.lecture-media.tsx scripts/verify-long-media-contract.mjs
      - run: rm .github/workflows/format-long-media-two-phase.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routes/app.lecture-media.tsx scripts/verify-long-media-contract.mjs .github/workflows/format-long-media-two-phase.yml
          git commit -m "chore: format two-phase long-media upload"
          git push origin HEAD:agent/long-lecture-media
