name: Prepare staged lecture restore slice

on:
  pull_request:
  push:
    branches:
      - agent/p1-010c4-streaming-lecture-restore-20260717

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-010c4-streaming-lecture-restore-20260717
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wire staged storage, Data UI and canonical checks
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function replaceRequired(source, before, after, label) {
            if (!source.includes(before)) throw new Error(`Missing patch anchor: ${label}`);
            return source.replace(before, after);
          }

          const mediaPath = 'src/lib/long-media-store.ts';
          let media = fs.readFileSync(mediaPath, 'utf8');
          if (!media.includes('export async function putLongMediaBackupChunk(')) {
            const anchor = `export async function getLongMediaChunkRecord(\n  uploadId: string,\n  index: number,\n): Promise<LongMediaChunkRecord | undefined> {\n  if (!uploadId || !Number.isInteger(index) || index < 0) return undefined;\n  const db = await openDatabase();\n  return readRecord<LongMediaChunkRecord>(db, CHUNK_STORE, [uploadId, index]);\n}\n`;
            const addition = `${anchor}\nexport async function putLongMediaBackupChunk(\n  record: LongMediaChunkRecord,\n): Promise<void> {\n  if (\n    !record.uploadId ||\n    !record.materialId ||\n    !Number.isInteger(record.index) ||\n    record.index < 0 ||\n    !(record.blob instanceof Blob) ||\n    record.blob.size <= 0 ||\n    record.size !== record.blob.size ||\n    !/^[a-f0-9]{64}$/.test(record.sha256)\n  ) {\n    throw new Error("The staged lecture backup chunk is invalid.");\n  }\n  const existing = await getLongMediaManifest(record.materialId);\n  if (existing) {\n    throw new Error("A staged lecture chunk cannot replace a published media manifest.");\n  }\n  const db = await openDatabase();\n  await writeRecord(db, CHUNK_STORE, record);\n}\n\nexport async function commitLongMediaBackupManifest(\n  manifest: LongMediaManifest,\n): Promise<void> {\n  if (await getLongMediaManifest(manifest.materialId)) {\n    throw new Error("The restore target already has a published media manifest.");\n  }\n  const db = await openDatabase();\n  const chunks = await readChunksForUpload(db, manifest.uploadId);\n  chunks.sort((left, right) => left.index - right.index);\n  if (chunks.length !== manifest.chunkCount) {\n    throw new Error("The staged lecture chunk count does not match its manifest.");\n  }\n  for (let index = 0; index < chunks.length; index += 1) {\n    const chunk = chunks[index];\n    if (\n      !chunk ||\n      chunk.index !== index ||\n      chunk.materialId !== manifest.materialId ||\n      chunk.uploadId !== manifest.uploadId ||\n      chunk.size !== chunk.blob.size\n    ) {\n      throw new Error("The staged lecture chunk identity is incomplete.");\n    }\n  }\n  if (chunks.reduce((sum, chunk) => sum + chunk.size, 0) !== manifest.size) {\n    throw new Error("The staged lecture byte total does not match its manifest.");\n  }\n  await writeRecord(db, MANIFEST_STORE, manifest);\n}\n\nexport async function deleteLongMediaUploadChunks(uploadId: string): Promise<void> {\n  if (!uploadId) return;\n  await deleteChunksForUpload(await openDatabase(), uploadId);\n}\n`;
            media = replaceRequired(media, anchor, addition, 'long-media staging APIs');
            fs.writeFileSync(mediaPath, media);
          }

          const dataPath = 'src/routes/app.data.tsx';
          let dataRoute = fs.readFileSync(dataPath, 'utf8');
          if (!dataRoute.includes('LectureRestorePanel')) {
            dataRoute = replaceRequired(
              dataRoute,
              `import { PageHeader } from "@/components/app-shell";`,
              `import { PageHeader } from "@/components/app-shell";\nimport { LectureRestorePanel } from "@/components/lecture-restore-panel";`,
              'Data page restore import',
            );
            dataRoute = replaceRequired(
              dataRoute,
              `      </section>\n\n      <div className="grid grid-cols-1 gap-4 md:grid-cols-2">`,
              `      </section>\n\n      <LectureRestorePanel />\n\n      <div className="grid grid-cols-1 gap-4 md:grid-cols-2">`,
              'Data page restore panel',
            );
            fs.writeFileSync(dataPath, dataRoute);
          }

          const packagePath = 'package.json';
          let pkg = fs.readFileSync(packagePath, 'utf8');
          if (!pkg.includes('"eval:lecture-restore"')) {
            pkg = replaceRequired(
              pkg,
              `    "eval:lecture-backup": "bun scripts/run-lecture-backup-evals.mjs",`,
              `    "eval:lecture-backup": "bun scripts/run-lecture-backup-evals.mjs",\n    "eval:lecture-restore": "bun scripts/run-lecture-restore-evals.mjs",`,
              'lecture restore eval command',
            );
            pkg = replaceRequired(
              pkg,
              `    "e2e:lecture-backup": "node scripts/run-lecture-backup-browser-e2e.mjs",`,
              `    "e2e:lecture-backup": "node scripts/run-lecture-backup-browser-e2e.mjs",\n    "e2e:lecture-restore": "node scripts/run-lecture-restore-browser-e2e.mjs",`,
              'lecture restore browser command',
            );
            pkg = replaceRequired(
              pkg,
              `    "verify:lecture-backup-contract": "node scripts/verify-lecture-backup-contract.mjs",`,
              `    "verify:lecture-backup-contract": "node scripts/verify-lecture-backup-contract.mjs",\n    "verify:lecture-restore-contract": "node scripts/verify-lecture-restore-contract.mjs",`,
              'lecture restore contract command',
            );
            fs.writeFileSync(packagePath, pkg);
          }

          const checkPath = 'scripts/check.mjs';
          let check = fs.readFileSync(checkPath, 'utf8');
          if (!check.includes('"verify:lecture-restore-contract"')) {
            check = replaceRequired(
              check,
              `  "verify:lecture-backup-contract",`,
              `  "verify:lecture-backup-contract",\n  "verify:lecture-restore-contract",`,
              'canonical restore contract',
            );
            check = replaceRequired(
              check,
              `  "eval:lecture-backup",`,
              `  "eval:lecture-backup",\n  "eval:lecture-restore",`,
              'canonical restore eval',
            );
            fs.writeFileSync(checkPath, check);
          }
          NODE

      - name: Format staged restore slice
        run: |
          npx prettier --write \
            src/lib/lecture-restore.ts \
            src/lib/long-media-store.ts \
            src/components/lecture-restore-panel.tsx \
            src/routes/app.data.tsx \
            scripts/run-lecture-restore-evals.mjs \
            scripts/run-lecture-restore-browser-e2e.mjs \
            scripts/verify-lecture-restore-contract.mjs \
            scripts/check.mjs \
            package.json \
            docs/STREAMING_LECTURE_RESTORE.md \
            .github/workflows/lecture-restore.yml

      - name: Verify contract
        run: npm run verify:lecture-restore-contract

      - name: Run deterministic eval
        run: npm run eval:lecture-restore

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/lecture-restore.ts src/lib/long-media-store.ts src/components/lecture-restore-panel.tsx src/routes/app.data.tsx scripts/run-lecture-restore-evals.mjs scripts/run-lecture-restore-browser-e2e.mjs scripts/verify-lecture-restore-contract.mjs scripts/check.mjs package.json docs/STREAMING_LECTURE_RESTORE.md
          git commit -m "feat: add staged streaming lecture restore"
          git push origin HEAD:agent/p1-010c4-streaming-lecture-restore-20260717
