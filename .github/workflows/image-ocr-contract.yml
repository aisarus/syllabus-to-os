name: Image OCR Contract

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-image-ocr-contract:
    name: Verify image OCR contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run image OCR contract
        run: |
          set -o pipefail
          npm run verify:image-ocr-contract 2>&1 | tee image-ocr-contract-output.txt

      - name: Upload image OCR contract output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-ocr-contract-output
          path: image-ocr-contract-output.txt
          if-no-files-found: error
          retention-days: 7
