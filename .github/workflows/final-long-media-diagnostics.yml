name: Final Long Media Diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-runner:
    if: github.head_ref == 'agent/long-lecture-media'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Format latest runner and workflow
        run: |
          npx prettier --write scripts/run-long-media-browser-e2e.mjs .github/workflows/long-media.yml
          npm run lint
      - name: Capture Exam Engine contract output
        id: exam_contract
        continue-on-error: true
        run: npm run verify:exam-engine-contract > exam-contract-output.txt 2>&1
      - name: Upload Exam Engine contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-contract-diagnostics
          path: exam-contract-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Remove one-time workflow
        run: rm -f .github/workflows/final-long-media-diagnostics.yml
      - name: Commit scoped formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "format final long media runner"
          git push origin HEAD:${{ github.head_ref }}
