name: Patch resumable review findings

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out patcher
        uses: actions/checkout@v4
        with:
          ref: main
          path: patch-source
          persist-credentials: false
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/resumable-long-transcription
          path: repo
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: repo
        run: bun install --frozen-lockfile
      - name: Apply review patch
        working-directory: repo
        run: python ../patch-source/.github/patch-resumable-review.py
      - name: Format patched files
        working-directory: repo
        run: |
          bunx prettier --write \
            .github/workflows/resumable-transcription.yml \
            src/components/long-media-data-boundary.tsx \
            src/components/resumable-transcription-panel.tsx \
            src/lib/resumable-transcription.ts \
            src/lib/resumable-transcription-store.ts \
            scripts/run-resumable-transcription-evals.mjs \
            scripts/verify-resumable-transcription-contract.mjs
      - name: Commit and push patch
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden resumable transcription integrity"
          git push origin HEAD:agent/resumable-long-transcription
