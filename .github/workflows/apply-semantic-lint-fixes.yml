name: Apply Semantic Lint Fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/long-lecture-media'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Apply typed compatibility fixes
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const reviewPath = 'src/components/golden-quiz-quality-review.tsx';
          let review = fs.readFileSync(reviewPath, 'utf8');
          review = review.replace(
            'import { useData } from "@/lib/store";',
            'import { useData, type QuizQuestion } from "@/lib/store";',
          );
          review = review.replace(
            '  question: Parameters<typeof parseGoldenQuizFeedback>[0] extends never ? never : any;',
            '  question: QuizQuestion;',
          );
          fs.writeFileSync(reviewPath, review);

          const compatPath = 'src/lib/store-multipage-compat.d.ts';
          let compat = fs.readFileSync(compatPath, 'utf8');
          compat = compat.replace(
            '  export interface MaterialIntakeOptions {}',
            '  export interface MaterialIntakeOptions {\n    readonly __multiPageCompatibilityMarker?: never;\n  }',
          );
          fs.writeFileSync(compatPath, compat);
          NODE
      - name: Remove one-time workflows
        run: |
          rm -f .github/workflows/semantic-lint-diagnostics.yml
          rm -f .github/workflows/apply-semantic-lint-fixes.yml
      - name: Format and verify
        run: |
          npx prettier --write src/components/golden-quiz-quality-review.tsx src/lib/store-multipage-compat.d.ts
          npm run typecheck
          npm run lint
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix typed lint baseline"
          git push origin HEAD:${{ github.head_ref }}
