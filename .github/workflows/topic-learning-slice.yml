name: Topic Learning Slice

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: topic-learning-slice-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-course-workspace:
    name: Format course materials memo
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Fix memo indentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/components/course-workspace.tsx")
          text = path.read_text()
          old = '''  const materials = useMemo(
          () => data.materials.filter((material) => material.courseId === courseId),
          [data.materials, courseId],
        );'''
          new = '''  const materials = useMemo(
            () => data.materials.filter((material) => material.courseId === courseId),
            [data.materials, courseId],
          );'''
          if old not in text:
              raise SystemExit("Expected unformatted memo block was not found")
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/course-workspace.tsx
          git commit -m "style: align course materials memo"
          git push

  verify:
    name: Eval, types, build and browser persistence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Run deterministic topic learning evaluations
        run: |
          set -o pipefail
          npm run eval:topic-learning 2>&1 | tee topic-learning-eval-output.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Run topic learning browser E2E
        run: |
          set -o pipefail
          node scripts/run-topic-learning-slice-browser-e2e.mjs 2>&1 | tee topic-learning-browser-output.txt

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: topic-learning-slice-diagnostics
          path: |
            topic-learning-eval-output.txt
            topic-learning-browser-output.txt
          if-no-files-found: ignore
          retention-days: 7
