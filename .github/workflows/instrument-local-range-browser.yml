name: Instrument Local Range Browser

on:
  push:
    branches:
      - agent/local-range-extraction
  workflow_dispatch:

permissions:
  contents: write

jobs:
  instrument:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/local-range-extraction
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Add bounded CDP calls and stage logs
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/run-local-range-extraction-browser-e2e.mjs')
          text = path.read_text()

          old = '''    return new Promise((resolveMessage, rejectMessage) => {
              this.pending.set(id, { resolve: resolveMessage, reject: rejectMessage });
              this.socket.send(JSON.stringify({ id, method, params, sessionId }));
            });'''
          new = '''    return new Promise((resolveMessage, rejectMessage) => {
              const timer = setTimeout(() => {
                this.pending.delete(id);
                rejectMessage(new Error(`CDP ${method} timed out after 20 seconds.`));
              }, 20_000);
              this.pending.set(id, { resolve: resolveMessage, reject: rejectMessage, timer });
              this.socket.send(JSON.stringify({ id, method, params, sessionId }));
            });'''
          if old not in text:
              raise SystemExit('CDP send marker not found')
          text = text.replace(old, new)

          old = '''    this.pending.delete(message.id);
              if (message.error) pending.reject(new Error(message.error.message));'''
          new = '''    this.pending.delete(message.id);
              clearTimeout(pending.timer);
              if (message.error) pending.reject(new Error(message.error.message));'''
          if old not in text:
              raise SystemExit('CDP response marker not found')
          text = text.replace(old, new)

          replacements = [
            ('    preview = spawn(', '    console.log("[local-range] starting preview");\n    preview = spawn('),
            ('    await waitForHttp(`${BASE_URL}/app/dashboard`, 30_000);', '    await waitForHttp(`${BASE_URL}/app/dashboard`, 30_000);\n    console.log("[local-range] preview ready");'),
            ('    const version = await waitForJson(`http://${HOST}:${DEBUG_PORT}/json/version`, 30_000);', '    const version = await waitForJson(`http://${HOST}:${DEBUG_PORT}/json/version`, 30_000);\n    console.log("[local-range] chrome debugger ready");'),
            ('    await page.evaluate(`(async () => {', '    console.log("[local-range] seeding fixture");\n    await page.evaluate(`(async () => {', 1),
            ('    await page.navigate("/app/materials/mat_extract");', '    console.log("[local-range] fixture seeded");\n    await page.navigate("/app/materials/mat_extract");'),
            ('    await page.waitForText("Локально извлечь clips из оригинала");', '    await page.waitForText("Локально извлечь clips из оригинала");\n    console.log("[local-range] extraction panel ready");', 1),
            ('    await page.clickText("Извлечь локально");', '    await page.clickText("Извлечь локально");\n    console.log("[local-range] extraction clicked");'),
            ('    const rangeResponse = await page.evaluate(`(async () => {', '    console.log("[local-range] clip persisted");\n    const rangeResponse = await page.evaluate(`(async () => {'),
            ('    await page.checkLabel("Я вижу провайдера");', '    console.log("[local-range] HTTP range verified");\n    await page.checkLabel("Я вижу провайдера");'),
            ('    await page.clickText("Отправить извлечённые clips");', '    await page.clickText("Отправить извлечённые clips");\n    console.log("[local-range] provider send clicked");'),
            ('    await page.clickText("Загрузить merged draft");', '    console.log("[local-range] provider result ready");\n    await page.clickText("Загрузить merged draft");'),
            ('    const beforeReload = await inspectProof(page);', '    console.log("[local-range] draft loaded");\n    const beforeReload = await inspectProof(page);'),
            ('    await page.reload();', '    console.log("[local-range] reloading");\n    await page.reload();'),
          ]

          for item in replacements:
              old, new, *count = item
              if old not in text:
                  raise SystemExit(f'stage marker not found: {old}')
              text = text.replace(old, new, count[0] if count else -1)

          path.write_text(text)
          PY

      - name: Format browser harness
        run: npx prettier --write scripts/run-local-range-extraction-browser-e2e.mjs

      - name: Commit instrumentation and remove workflow
        run: |
          rm .github/workflows/instrument-local-range-browser.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: bound and instrument local range Chromium"
          git push origin HEAD:agent/local-range-extraction
