name: Concept Extraction Verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify concept extraction contract and evaluations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Verify reviewed concept extraction contract
        run: npm run verify:concept-extraction-contract

      - name: Run reviewed concept extraction evaluations
        run: npm run eval:concept-extraction 2>&1 | tee concept-extraction-eval-output.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Upload concept extraction diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: concept-extraction-diagnostics
          path: concept-extraction-eval-output.txt
          if-no-files-found: ignore
          retention-days: 7
