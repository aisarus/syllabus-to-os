name: Patch long media SPA wait

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Require the real SPA transition
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/run-long-media-browser-e2e-v2.mjs')
          text = path.read_text()
          old = '''    if (!(await page.evaluate(`location.pathname === "/app/materials/${materialId}"`))) {
      await page.navigate(`/app/materials/${materialId}`);
    }
    await page.waitForText("Длинная запись лекции", 45_000);
'''
          new = '''    await page.waitFor(
      `location.pathname === "/app/materials/${materialId}"`,
      25_000,
    );
    await page.waitForText("Длинная запись лекции", 45_000);
'''
          if old not in text:
              raise SystemExit('hard-navigation fallback was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write scripts/run-long-media-browser-e2e-v2.mjs
      - name: Commit and remove workflow
        run: |
          rm .github/workflows/patch-long-media-spa-wait.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run-long-media-browser-e2e-v2.mjs .github/workflows/patch-long-media-spa-wait.yml
          git commit -m "test: wait for completed lecture upload SPA transition"
          git push origin HEAD:agent/long-lecture-media
