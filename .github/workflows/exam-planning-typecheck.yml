name: Exam Planning Type Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  type-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Capture typecheck output
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > exam-planning-typecheck.txt 2>&1
      - name: Upload typecheck output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-planning-typecheck
          path: exam-planning-typecheck.txt
          if-no-files-found: error
          retention-days: 3
      - name: Fail after upload
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
