name: Apply deterministic recall source

on:
  push:
    branches:
      - feat/deterministic-recall-source

permissions:
  contents: write

concurrency:
  group: apply-deterministic-recall-source
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/deterministic-recall-source
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Apply bounded source and verifier changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"marker missing in {path}: {old[:80]}")
              file.write_text(text.replace(old, new, 1))

          replace(
              "src/lib/concept-evidence.ts",
              '    | "open_answer_review"\n    | "manual";',
              '    | "open_answer_review"\n    | "deterministic_recall"\n    | "manual";',
          )
          replace(
              "src/lib/concept-evidence.ts",
              '      "open_answer_review",\n      "manual",',
              '      "open_answer_review",\n      "deterministic_recall",\n      "manual",',
          )
          replace(
              "src/lib/concept-evidence.ts",
              '  if (sourceType === "quiz_question_answer" && (!attemptId || !questionId)) return null;\n  const reviewMode',
              '  if (sourceType === "quiz_question_answer" && (!attemptId || !questionId)) return null;\n  const sourceId = optionalString(value.sourceId);\n  const reviewMode',
          )
          replace(
              "src/lib/concept-evidence.ts",
              '  if (\n    sourceType === "open_answer_review" &&',
              '  if (\n    sourceType === "deterministic_recall" &&\n    (!sourceId || !prompt || !response || kind !== "recall" || outcome === "mixed")\n  ) {\n    return null;\n  }\n  if (\n    sourceType === "open_answer_review" &&',
          )
          replace(
              "src/lib/concept-evidence.ts",
              '    sourceId: optionalString(value.sourceId),',
              '    sourceId,',
          )
          replace(
              "src/components/topic-learning-slice.tsx",
              '      sourceType: "manual",',
              '      sourceType: "deterministic_recall",',
          )

          topic = Path("src/lib/topic-learning-slice.ts")
          text = topic.read_text()
          old = '''export function evaluateTopicRecall(input: TopicRecallInput): TopicRecallResult {
  const expected = buildRecallTerms(input);
  const responseTerms = new Set(normalizeRecallText(input.response));
  const matchedTerms = expected.filter((term) => responseTerms.has(term));
  const missingTerms = expected.filter((term) => !responseTerms.has(term));'''
          new = '''function recallMatchKeys(token: string): string[] {
  const keys = new Set([token]);

  const english = token.match(/^[a-z]+$/) ? token : "";
  if (english.length >= 5) {
    if (english.endsWith("ies") && english.length > 5) keys.add(`${english.slice(0, -3)}y`);
    for (const suffix of ["ing", "ed", "es", "s"]) {
      if (english.endsWith(suffix) && english.length - suffix.length >= 4) {
        keys.add(english.slice(0, -suffix.length));
      }
    }
  }

  const russian = token.match(/^[а-яё]+$/u) ? token : "";
  if (russian.length >= 5) {
    for (const suffix of [
      "иями", "ями", "ами", "ого", "ему", "ому", "ыми", "ими", "ий", "ый", "ой",
      "ая", "яя", "ое", "ее", "ые", "ие", "ую", "юю", "ам", "ям", "ах", "ях",
      "ов", "ев", "ом", "ем", "ы", "и", "а", "я", "у", "ю", "е",
    ]) {
      if (russian.endsWith(suffix) && russian.length - suffix.length >= 4) {
        keys.add(russian.slice(0, -suffix.length));
        break;
      }
    }
  }

  const hebrew = token.match(/^[א-ת]+$/u) ? token : "";
  if (hebrew.length >= 4) {
    const withoutPrefix = /^[בכלמוהש]/u.test(hebrew) && hebrew.length >= 5 ? hebrew.slice(1) : hebrew;
    keys.add(withoutPrefix);
    for (const candidate of [hebrew, withoutPrefix]) {
      for (const suffix of ["ים", "ות"]) {
        if (candidate.endsWith(suffix) && candidate.length - suffix.length >= 3) {
          keys.add(candidate.slice(0, -suffix.length));
        }
      }
    }
  }

  return [...keys];
}

export function evaluateTopicRecall(input: TopicRecallInput): TopicRecallResult {
  const expected = buildRecallTerms(input);
  const responseTerms = normalizeRecallText(input.response);
  const responseKeys = new Set(responseTerms.flatMap(recallMatchKeys));
  const matchedTerms = expected.filter((term) =>
    recallMatchKeys(term).some((key) => responseKeys.has(key)),
  );
  const missingTerms = expected.filter((term) => !matchedTerms.includes(term));'''
          if new not in text:
              if old not in text:
                  raise SystemExit("topic verifier marker missing")
              text = text.replace(old, new, 1)
          text = text.replace(
              '.normalize("NFKC")\n    .toLocaleLowerCase()',
              '.normalize("NFKC")\n    .replace(/[\\u0591-\\u05c7]/gu, "")\n    .toLocaleLowerCase()',
              1,
          )
          topic.write_text(text)

          evals = Path("scripts/run-topic-learning-slice-evals.mjs")
          text = evals.read_text()
          marker = 'console.log("Topic learning slice deterministic evaluations passed.");'
          addition = '''const russianInflection = evaluateTopicRecall({
  title: "Судебный контроль",
  aliases: [],
  explanation: "Независимые суды ограничивают исполнительную власть.",
  response: "Независимыми судами ограничивается исполнительная власть.",
});
assert.equal(russianInflection.passed, true, "Russian inflections should match deterministically");

const englishInflection = evaluateTopicRecall({
  title: "Judicial review",
  aliases: [],
  explanation: "Independent courts limit executive decisions.",
  response: "An independent court limits executive decision making.",
});
assert.equal(englishInflection.passed, true, "English inflections should match deterministically");

const hebrewInflection = evaluateTopicRecall({
  title: "פיקוח שיפוטי",
  aliases: [],
  explanation: "פיקוח שיפוטי מגביל ממשלה.",
  response: "הפיקוח השיפוטי מגבילים את הממשלה.",
});
assert.equal(hebrewInflection.passed, true, "Hebrew prefixes and plurals should match deterministically");

'''
          if addition not in text:
              text = text.replace(marker, addition + marker)
          evals.write_text(text)

          browser = Path("scripts/run-topic-learning-slice-browser-e2e.mjs")
          text = browser.read_text()
          old = 'return { count: events.length, outcome: events[0]?.outcome, score: events[0]?.score, sourceId: events[0]?.sourceId };'
          new = 'return { count: events.length, outcome: events[0]?.outcome, score: events[0]?.score, sourceId: events[0]?.sourceId, sourceType: events[0]?.sourceType };'
          if new not in text:
              if old not in text:
                  raise SystemExit("browser event marker missing")
              text = text.replace(old, new, 1)
          assertion = '    assert(beforeReload.sourceType === "deterministic_recall", "Verified recall must persist the dedicated source type");\n'
          anchor = '    assert(beforeReload.sourceId?.startsWith("topic-recall:con_loop:"), "Verified recall must persist a stable attempt key");\n'
          if assertion not in text:
              text = text.replace(anchor, anchor + assertion, 1)
          browser.write_text(text)

          docs = Path("docs/TOPIC_LEARNING_SLICE.md")
          text = docs.read_text()
          text = text.replace(
              'The event remains compatible with the existing `lamdan.concept-evidence.v1` schema by using the current `manual` source type plus a stable `topic-recall:*` source identifier.',
              'New verified events use the backward-compatible `deterministic_recall` source type plus a stable `topic-recall:*` source identifier. Existing `manual` events remain valid and unchanged during normalization.',
          )
          docs.write_text(text)
          PY
      - name: Verify focused slice
        run: |
          node --experimental-strip-types scripts/run-topic-learning-slice-evals.mjs
          npm run typecheck
          npm run build
          node scripts/run-topic-learning-slice-browser-e2e.mjs
      - name: Commit generated source changes
        run: |
          git config user.name "aegis-builder"
          git config user.email "actions@users.noreply.github.com"
          git add src/lib/concept-evidence.ts src/lib/topic-learning-slice.ts src/components/topic-learning-slice.tsx scripts/run-topic-learning-slice-evals.mjs scripts/run-topic-learning-slice-browser-e2e.mjs docs/TOPIC_LEARNING_SLICE.md
          if git diff --cached --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git commit -m "feat: add deterministic recall evidence source"
          git push origin HEAD:feat/deterministic-recall-source
