name: Semantic Lint Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.head_ref == 'agent/long-lecture-media'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Capture semantic ESLint output
        id: lint
        continue-on-error: true
        run: npm run lint > semantic-lint-output.txt 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semantic-lint-diagnostics
          path: semantic-lint-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail when lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
