name: Topic Learning Slice

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: topic-learning-slice-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Eval, types, build and browser persistence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Apply bounded deterministic recall migration
        if: github.head_ref == 'feat/deterministic-recall-source'
        run: python3 scripts/apply-deterministic-recall-source.py

      - name: Run deterministic topic learning evaluations
        run: node --experimental-strip-types scripts/run-topic-learning-slice-evals.mjs 2>&1 | tee topic-learning-eval-output.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Run topic learning browser E2E
        run: node scripts/run-topic-learning-slice-browser-e2e.mjs 2>&1 | tee topic-learning-browser-output.txt

      - name: Commit bounded migration
        if: github.head_ref == 'feat/deterministic-recall-source'
        run: |
          git config user.name "aegis-builder"
          git config user.email "actions@users.noreply.github.com"
          git add src/lib/concept-evidence.ts src/lib/topic-learning-slice.ts src/components/topic-learning-slice.tsx scripts/run-topic-learning-slice-evals.mjs scripts/run-topic-learning-slice-browser-e2e.mjs docs/TOPIC_LEARNING_SLICE.md
          if git diff --cached --quiet; then
            echo "No migration diff."
            exit 0
          fi
          git commit -m "feat: add deterministic recall evidence source"
          git push origin HEAD:feat/deterministic-recall-source

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: topic-learning-slice-diagnostics
          path: |
            topic-learning-eval-output.txt
            topic-learning-browser-output.txt
          if-no-files-found: ignore
          retention-days: 7
