name: Local Range Extraction

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: local-range-extraction-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  local-range-extraction:
    name: Contract, eval, types, lint, build and Chromium proof
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify local range extraction contract
        id: extraction_contract
        continue-on-error: true
        run: node scripts/verify-local-range-extraction-contract.mjs > local-range-extraction-contract.txt 2>&1

      - name: Upload extraction contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-range-extraction-contract-diagnostics
          path: local-range-extraction-contract.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when extraction contract fails
        if: steps.extraction_contract.outcome == 'failure'
        run: exit 1

      - name: Run local range extraction evaluations
        id: extraction_evals
        continue-on-error: true
        run: bun scripts/run-local-range-extraction-evals.mjs > local-range-extraction-evals.txt 2>&1

      - name: Upload extraction evaluation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-range-extraction-eval-diagnostics
          path: local-range-extraction-evals.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when extraction evaluations fail
        if: steps.extraction_evals.outcome == 'failure'
        run: exit 1

      - name: Typecheck
        id: extraction_typecheck
        continue-on-error: true
        run: npm run typecheck > local-range-extraction-typecheck.txt 2>&1

      - name: Upload extraction typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-range-extraction-typecheck-diagnostics
          path: local-range-extraction-typecheck.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when extraction typecheck fails
        if: steps.extraction_typecheck.outcome == 'failure'
        run: exit 1

      - name: Lint
        id: extraction_lint
        continue-on-error: true
        run: npm run lint > local-range-extraction-lint.txt 2>&1

      - name: Upload extraction lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-range-extraction-lint-diagnostics
          path: local-range-extraction-lint.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when extraction lint fails
        if: steps.extraction_lint.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm run build

      - name: Run local range extraction browser E2E
        id: extraction_browser
        continue-on-error: true
        run: timeout --signal=TERM --kill-after=10s 180s node scripts/run-local-range-extraction-browser-e2e.mjs > local-range-extraction-browser.txt 2>&1

      - name: Upload extraction browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-range-extraction-browser-diagnostics
          path: local-range-extraction-browser.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when extraction browser E2E fails
        if: steps.extraction_browser.outcome == 'failure'
        run: exit 1
