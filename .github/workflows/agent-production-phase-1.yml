name: Agent production phase 1

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-production-phase-1.mjs
      - scripts/fix-production-phase-1-specifiers.mjs
      - .github/workflows/agent-production-phase-1.yml
  push:
    branches:
      - agent/production-phase-1-stabilization
    paths:
      - scripts/apply-production-phase-1.mjs
      - scripts/fix-production-phase-1-specifiers.mjs
      - .github/workflows/agent-production-phase-1.yml

permissions:
  contents: write

concurrency:
  group: agent-production-phase-1
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[phase1-generated]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/production-phase-1-stabilization

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reconcile execution ledger
        run: node scripts/apply-production-phase-1.mjs docs

      - name: Commit documentation reconciliation
        run: |
          git config user.name "Lamdan Production Agent"
          git config user.email "actions@users.noreply.github.com"
          git add PLANS.md TASKS.md STATUS.md
          git commit -m "docs: reconcile execution ledger with main [phase1-generated]"

      - name: Apply durable repository boundary
        run: |
          node scripts/apply-production-phase-1.mjs store
          node scripts/fix-production-phase-1-specifiers.mjs

      - name: Verify store safety contract
        run: npm run verify:store-safety-contract

      - name: Run store safety evaluation
        id: store-eval
        continue-on-error: true
        run: npm run eval:store-safety > phase1-store-eval.log 2>&1

      - name: Upload evaluation diagnostics
        if: steps.store-eval.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: phase1-store-eval-debug
          path: |
            phase1-store-eval.log
            src/lib/store.ts
            src/lib/source-reference-safety.ts
            src/lib/workspace-repository.ts
            src/lib/source-safe-store.ts
            scripts/run-store-safety-evals.mjs
          if-no-files-found: error
          retention-days: 2

      - name: Fail on store evaluation error
        if: steps.store-eval.outcome == 'failure'
        run: |
          cat phase1-store-eval.log
          exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Commit stabilization foundation
        run: |
          git add src/lib/store.ts src/lib/source-reference-safety.ts src/lib/workspace-repository.ts src/lib/source-safe-store.ts src/lib/install-store-safety.ts src/routes/__root.tsx src/components/store-safety-lifecycle.tsx scripts/run-store-safety-evals.mjs scripts/verify-store-safety-contract.mjs
          git commit -m "refactor(store): add durable workspace repository boundary [phase1-generated]"

      - name: Push verified commits
        run: git push origin HEAD:agent/production-phase-1-stabilization
