name: Format long media final files

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Format final long-media files
        run: npx prettier --write scripts/run-long-media-browser-e2e-v2.mjs scripts/verify-long-media-contract.mjs scripts/run-built-preview.mjs package.json
      - name: Commit and remove workflow
        run: |
          rm .github/workflows/format-long-media-final.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run-long-media-browser-e2e-v2.mjs scripts/verify-long-media-contract.mjs scripts/run-built-preview.mjs package.json .github/workflows/format-long-media-final.yml
          git commit -m "style: format final long-media files"
          git push origin HEAD:agent/long-lecture-media
