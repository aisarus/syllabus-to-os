name: Exam Engine

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: exam-engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exam-engine:
    name: Contract, eval, build and browser proof
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Exam Engine contract
        id: exam_contract
        continue-on-error: true
        run: node scripts/verify-exam-engine-contract.mjs > exam-engine-contract-output.txt 2>&1

      - name: Upload Exam Engine contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-engine-contract-diagnostics
          path: exam-engine-contract-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when Exam Engine contract fails
        if: steps.exam_contract.outcome == 'failure'
        run: exit 1

      - name: Run Exam Engine evaluations
        run: node --experimental-strip-types scripts/run-exam-engine-evals.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint 2>&1 | tee exam-engine-lint-output.txt

      - name: Upload Exam Engine lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: exam-engine-lint-diagnostics
          path: exam-engine-lint-output.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when Exam Engine lint fails
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm run build

      - name: Run Exam Engine browser E2E
        id: exam_browser
        continue-on-error: true
        run: node scripts/run-exam-engine-browser-e2e.mjs > exam-engine-browser-output.txt 2>&1

      - name: Upload Exam Engine browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exam-engine-browser-diagnostics
          path: exam-engine-browser-output.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Fail when Exam Engine browser E2E fails
        if: steps.exam_browser.outcome == 'failure'
        run: exit 1
