name: Format long media route

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx prettier --write src/routes/app.lecture-media.tsx
      - run: rm .github/workflows/format-long-media-route.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routes/app.lecture-media.tsx .github/workflows/format-long-media-route.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: format long-media route"
          git push origin HEAD:agent/long-lecture-media
