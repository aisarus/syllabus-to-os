name: Patch Exam Engine hydration

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Reconcile course selection after hydration
        run: |
          python - <<'PY'
          from pathlib import Path

          component = Path('src/components/exam-engine.tsx')
          text = component.read_text()
          anchor = '''  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    const nextQuiz = core.quizzes.find('''
          replacement = '''  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    if (!core.courses.some((course) => course.id === courseId)) {
      setCourseId(core.courses[0]?.id ?? "");
    }
  }, [courseId, core.courses]);

  useEffect(() => {
    const nextQuiz = core.quizzes.find('''
          if anchor not in text:
              raise SystemExit('Exam Engine hydration anchor not found')
          component.write_text(text.replace(anchor, replacement, 1))

          contract = Path('scripts/verify-exam-engine-contract.mjs')
          contract_text = contract.read_text()
          marker = '"setCourseId(core.courses[0]?.id ?? \"\")",'
          target = '"Source-grounded экзамены",'
          if marker not in contract_text:
              if target not in contract_text:
                  raise SystemExit('Exam Engine contract marker anchor not found')
              contract_text = contract_text.replace(target, target + '\n  ' + marker, 1)
          contract.write_text(contract_text)
          PY
          bunx prettier --write src/components/exam-engine.tsx scripts/verify-exam-engine-contract.mjs
          rm .github/workflows/patch-exam-hydration.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/exam-engine.tsx scripts/verify-exam-engine-contract.mjs .github/workflows/patch-exam-hydration.yml
          git commit -m "fix: hydrate Exam Engine course selection"
          git push origin HEAD:agent/long-lecture-media
