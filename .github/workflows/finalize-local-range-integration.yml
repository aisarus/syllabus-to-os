name: Finalize Local Range Integration

on:
  push:
    branches:
      - agent/local-range-extraction
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/local-range-extraction
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply final integration fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          extractor = Path('src/lib/local-range-extraction.ts')
          text = extractor.read_text()
          old = '  element.preload = "auto";\n  element.playsInline = true;\n  element.src = buildLongMediaStreamUrl(manifest);'
          new = '  element.preload = "auto";\n  element.playsInline = true;\n  element.defaultPlaybackRate = 1;\n  element.playbackRate = 1;\n  element.src = buildLongMediaStreamUrl(manifest);'
          if old not in text and 'element.playbackRate = 1;' not in text:
              raise SystemExit('Could not find media element setup marker')
          extractor.write_text(text.replace(old, new))

          panel = Path('src/components/local-range-extraction-panel.tsx')
          text = panel.read_text().replace('providerStatus?.providerDisplayName', 'providerStatus?.displayName')
          panel.write_text(text)
          PY

      - name: Format integration files
        run: |
          npx prettier --write \
            src/lib/local-range-extraction.ts \
            src/components/local-range-extraction-panel.tsx \
            src/routes/app.materials_.'$materialId'.tsx \
            src/components/long-media-lifecycle.tsx \
            src/components/long-media-data-boundary.tsx \
            scripts/verify-local-range-extraction-contract.mjs \
            .github/workflows/local-range-extraction.yml

      - name: Commit fixes and remove this workflow
        run: |
          rm .github/workflows/finalize-local-range-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No integration changes."
            exit 0
          fi
          git commit -m "fix: complete local range extraction integration"
          git push origin HEAD:agent/local-range-extraction
