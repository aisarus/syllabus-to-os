name: One-shot resumable formatter

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/resumable-long-transcription
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Format scoped files
        run: |
          bunx prettier --write \
            scripts/run-resumable-transcription-browser-e2e.mjs \
            scripts/verify-resumable-transcription-contract.mjs
      - name: Commit feature formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/run-resumable-transcription-browser-e2e.mjs \
            scripts/verify-resumable-transcription-contract.mjs
          git commit -m "chore: format resumable transcription browser proof"
          git push origin HEAD:agent/resumable-long-transcription
      - name: Remove one-shot workflow from main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          rm .github/workflows/format-resumable-via-main.yml
          git add .github/workflows/format-resumable-via-main.yml
          git commit -m "chore: remove one-shot resumable formatter"
          git push origin HEAD:main
