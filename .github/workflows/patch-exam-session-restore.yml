name: Patch Exam session restore

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Restore latest frozen session on client mount
        run: |
          python - <<'PY'
          from pathlib import Path

          component = Path('src/components/exam-engine.tsx')
          text = component.read_text()
          old_import = 'import { examEngineStore, useExamEngineData } from "@/lib/exam-engine-store";'
          new_import = 'import {\n  examEngineStore,\n  getExamEngineSnapshot,\n  useExamEngineData,\n} from "@/lib/exam-engine-store";'
          if old_import not in text:
              raise SystemExit('Exam Engine store import not found')
          text = text.replace(old_import, new_import, 1)
          old_state = '  const [activeSessionId, setActiveSessionId] = useState<string | null>(null);'
          new_state = '''  const [activeSessionId, setActiveSessionId] = useState<string | null>(
    () => getExamEngineSnapshot().sessions[0]?.id ?? null,
  );'''
          if old_state not in text:
              raise SystemExit('Exam Engine active session state not found')
          component.write_text(text.replace(old_state, new_state, 1))

          contract = Path('scripts/verify-exam-engine-contract.mjs')
          contract_text = contract.read_text()
          marker = '"getExamEngineSnapshot().sessions[0]?.id ?? null",'
          anchor = '"examEngineStore.startSession",'
          if marker not in contract_text:
              if anchor not in contract_text:
                  raise SystemExit('Exam Engine contract anchor not found')
              contract_text = contract_text.replace(anchor, anchor + '\n  ' + marker, 1)
          contract.write_text(contract_text)
          PY
          bunx prettier --write src/components/exam-engine.tsx scripts/verify-exam-engine-contract.mjs
          rm .github/workflows/patch-exam-session-restore.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/exam-engine.tsx scripts/verify-exam-engine-contract.mjs .github/workflows/patch-exam-session-restore.yml
          git commit -m "fix: restore the latest frozen exam session"
          git push origin HEAD:agent/long-lecture-media
