name: Topic Learning Slice

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: topic-learning-slice-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Eval, types, build and browser persistence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Add English browser proof
        if: github.head_ref == 'test/recall-breakdown-en-browser'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/run-topic-learning-slice-browser-e2e.mjs')
          text = path.read_text()
          old = '''    await page.waitForText("Подтверждённый прогресс");
    const afterReload = await page.evaluate(`(() => {
'''
          new = '''    await page.waitForText("Подтверждённый прогресс");

    await page.evaluate(`localStorage.setItem("lamdan.lang", "en")`);
    await page.reload();
    await page.waitForText("Topic learning check");
    await page.evaluate(`(() => {
      const textarea = [...document.querySelectorAll("textarea")].find((item) => item.placeholder?.includes("Answer without looking back"));
      if (!textarea) throw new Error("English recall textarea not found");
      const setter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, "value").set;
      setter.call(textarea, "Судебный контроль — проверка решений независимыми судами.");
      textarea.dispatchEvent(new Event("input", { bubbles: true }));
    })()`);
    await page.clickText("Verify answer");
    await page.waitFor(`document.querySelector('[data-topic-recall-result="passed"]')`);
    await page.waitFor(`document.querySelector('[data-topic-recall-match-breakdown]')?.textContent?.includes('Exact matches:') && document.querySelector('[data-topic-recall-match-breakdown]')?.textContent?.includes('Normalized forms:')`);
    await page.reload();
    await page.waitFor(`document.querySelector('[data-persisted-topic-progress="success"]')`);
    await page.waitForText("Verified progress");

    const afterReload = await page.evaluate(`(() => {
'''
          if new not in text:
              if old not in text:
                  raise SystemExit('English browser proof insertion point missing')
              path.write_text(text.replace(old, new, 1))
          PY

      - name: Run deterministic topic learning evaluations
        run: node --experimental-strip-types scripts/run-topic-learning-slice-evals.mjs 2>&1 | tee topic-learning-eval-output.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Run topic learning browser E2E
        run: node scripts/run-topic-learning-slice-browser-e2e.mjs 2>&1 | tee topic-learning-browser-output.txt

      - name: Commit English browser proof
        if: github.head_ref == 'test/recall-breakdown-en-browser'
        run: |
          git config user.name "aegis-recovery"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/run-topic-learning-slice-browser-e2e.mjs
          if git diff --cached --quiet; then
            echo "No English browser proof diff."
            exit 0
          fi
          git commit -m "test: prove English recall match breakdown"
          git push origin HEAD:test/recall-breakdown-en-browser

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: topic-learning-slice-diagnostics
          path: |
            topic-learning-eval-output.txt
            topic-learning-browser-output.txt
          if-no-files-found: ignore
          retention-days: 7
