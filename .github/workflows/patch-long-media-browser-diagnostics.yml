name: Patch long media browser diagnostics

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - name: Add timeout diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/run-long-media-browser-e2e.mjs')
          text = path.read_text()
          old = '    throw new Error(`Timed out waiting for: ${expression}`);'
          new = '''    let diagnostics;
    try {
      diagnostics = await this.evaluate(`(async () => {
        let longMedia = null;
        try {
          const request = indexedDB.open("lamdan-long-media", 1);
          const db = await new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
          const readAll = (storeName) => new Promise((resolve, reject) => {
            const read = db.transaction(storeName, "readonly").objectStore(storeName).getAll();
            read.onsuccess = () => resolve(read.result);
            read.onerror = () => reject(read.error);
          });
          const [manifests, chunks, transcripts] = await Promise.all([
            readAll("manifests"),
            readAll("chunks"),
            readAll("transcripts"),
          ]);
          db.close();
          longMedia = {
            manifests: manifests.length,
            chunks: chunks.length,
            transcripts: transcripts.length,
          };
        } catch (error) {
          longMedia = { error: error instanceof Error ? error.message : String(error) };
        }
        return {
          href: location.href,
          body: document.body?.innerText.slice(0, 5000),
          core: localStorage.getItem("lamdan.data.v1"),
          longMedia,
        };
      })()`);
    } catch (diagnosticError) {
      diagnostics = { error: diagnosticError instanceof Error ? diagnosticError.message : String(diagnosticError) };
    }
    throw new Error(`Timed out waiting for: ${expression}\nBrowser diagnostics: ${JSON.stringify(diagnostics)}`);'''
          if old not in text:
              raise SystemExit('target waitFor throw was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/patch-long-media-browser-diagnostics.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/run-long-media-browser-e2e.mjs .github/workflows/patch-long-media-browser-diagnostics.yml
          git commit -m "test: add long media browser timeout diagnostics"
          git push origin HEAD:agent/long-lecture-media
