name: Prepare streaming lecture backup slice

on:
  push:
    branches:
      - agent/p1-010c3-streaming-lecture-backup-20260717

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-010c3-streaming-lecture-backup-20260717
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wire store access and canonical scripts
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function replaceRequired(source, before, after, label) {
            if (!source.includes(before)) throw new Error(`Missing patch anchor: ${label}`);
            return source.replace(before, after);
          }

          const mediaPath = 'src/lib/long-media-store.ts';
          let media = fs.readFileSync(mediaPath, 'utf8');
          media = replaceRequired(
            media,
            `export async function listLongMediaManifests(): Promise<LongMediaManifest[]> {\n  const db = await openDatabase();\n  return readAll<LongMediaManifest>(db, MANIFEST_STORE);\n}\n`,
            `export async function listLongMediaManifests(): Promise<LongMediaManifest[]> {\n  const db = await openDatabase();\n  return readAll<LongMediaManifest>(db, MANIFEST_STORE);\n}\n\nexport async function getLongMediaChunkRecord(\n  uploadId: string,\n  index: number,\n): Promise<LongMediaChunkRecord | undefined> {\n  if (!uploadId || !Number.isInteger(index) || index < 0) return undefined;\n  const db = await openDatabase();\n  return readRecord<LongMediaChunkRecord>(db, CHUNK_STORE, [uploadId, index]);\n}\n`,
            'long-media chunk accessor',
          );
          fs.writeFileSync(mediaPath, media);

          const resumablePath = 'src/lib/resumable-transcription-store.ts';
          let resumable = fs.readFileSync(resumablePath, 'utf8');
          resumable = replaceRequired(
            resumable,
            `export async function listResumableRangeClips(\n  materialId: string,\n): Promise<ResumableRangeClipRecord[]> {`,
            `export async function getResumableRangeClip(\n  materialId: string,\n  rangeId: string,\n): Promise<ResumableRangeClipRecord | undefined> {\n  if (!materialId || !rangeId) return undefined;\n  const db = await openDatabase();\n  return readRecord<ResumableRangeClipRecord>(db, CLIP_STORE, [materialId, rangeId]);\n}\n\nexport async function listResumableRangeClips(\n  materialId: string,\n): Promise<ResumableRangeClipRecord[]> {`,
            'range clip accessor',
          );
          fs.writeFileSync(resumablePath, resumable);

          const packagePath = 'package.json';
          let pkg = fs.readFileSync(packagePath, 'utf8');
          pkg = replaceRequired(
            pkg,
            `    "eval:local-range-extraction": "bun scripts/run-local-range-extraction-evals.mjs",`,
            `    "eval:local-range-extraction": "bun scripts/run-local-range-extraction-evals.mjs",\n    "eval:lecture-backup": "bun scripts/run-lecture-backup-evals.mjs",`,
            'lecture backup eval script',
          );
          pkg = replaceRequired(
            pkg,
            `    "e2e:local-range-extraction": "node scripts/run-local-range-extraction-browser-e2e.mjs",`,
            `    "e2e:local-range-extraction": "node scripts/run-local-range-extraction-browser-e2e.mjs",\n    "e2e:lecture-backup": "node scripts/run-lecture-backup-browser-e2e.mjs",`,
            'lecture backup e2e script',
          );
          pkg = replaceRequired(
            pkg,
            `    "verify:local-range-extraction-contract": "node scripts/verify-local-range-extraction-contract.mjs",`,
            `    "verify:local-range-extraction-contract": "node scripts/verify-local-range-extraction-contract.mjs",\n    "verify:lecture-backup-contract": "node scripts/verify-lecture-backup-contract.mjs",`,
            'lecture backup contract script',
          );
          fs.writeFileSync(packagePath, pkg);

          const checkPath = 'scripts/check.mjs';
          let check = fs.readFileSync(checkPath, 'utf8');
          check = replaceRequired(
            check,
            `  "verify:local-range-extraction-contract",`,
            `  "verify:local-range-extraction-contract",\n  "verify:lecture-backup-contract",`,
            'canonical lecture backup contract',
          );
          check = replaceRequired(
            check,
            `  "eval:local-range-extraction",`,
            `  "eval:local-range-extraction",\n  "eval:lecture-backup",`,
            'canonical lecture backup eval',
          );
          fs.writeFileSync(checkPath, check);
          NODE

      - name: Format and validate
        run: |
          npx prettier --write \
            src/lib/lecture-backup.ts \
            src/lib/long-media-store.ts \
            src/lib/resumable-transcription-store.ts \
            src/components/lecture-backup-panel.tsx \
            'src/routes/app.materials_.$materialId.tsx' \
            scripts/run-lecture-backup-evals.mjs \
            scripts/run-lecture-backup-browser-e2e.mjs \
            scripts/verify-lecture-backup-contract.mjs \
            scripts/check.mjs \
            package.json \
            docs/STREAMING_LECTURE_BACKUP.md \
            .github/workflows/lecture-backup.yml
          npm run verify:lecture-backup-contract
          npm run eval:lecture-backup
          npm run typecheck
          npm run lint
          npm run build

      - name: Commit prepared slice and remove helper
        run: |
          rm .github/workflows/prepare-lecture-backup-slice.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add streaming lecture backup export"
          git push origin HEAD:agent/p1-010c3-streaming-lecture-backup-20260717
