name: Apply Course Workspace Fix

on:
  push:
    branches:
      - fix/topic-learning-ci-pipefail
    paths:
      - .github/workflows/apply-course-workspace-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/topic-learning-ci-pipefail
      - name: Memoize course materials
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/course-workspace.tsx')
          text = path.read_text()
          old = '  const materials = data.materials.filter((material) => material.courseId === courseId);'
          new = '''  const materials = useMemo(
    () => data.materials.filter((material) => material.courseId === courseId),
    [data.materials, courseId],
  );'''
          if old not in text:
              raise SystemExit('target declaration not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/course-workspace.tsx
          git commit -m "fix: stabilize empty course materials"
          git push origin HEAD:fix/topic-learning-ci-pipefail
