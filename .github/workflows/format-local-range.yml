name: Format Local Range Extraction

on:
  push:
    branches:
      - agent/local-range-extraction
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/local-range-extraction
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format local range extraction files
        run: |
          npx prettier --write \
            public/long-media-stream-worker.js \
            scripts/run-local-range-extraction-browser-e2e.mjs \
            scripts/run-local-range-extraction-evals.mjs \
            scripts/verify-local-range-extraction-contract.mjs \
            src/components/local-range-extraction-panel.tsx \
            src/lib/local-range-extraction-events.ts \
            src/lib/local-range-extraction-store.ts \
            src/lib/local-range-extraction.ts \
            src/lib/long-media-streaming.ts \
            .github/workflows/local-range-extraction.yml

      - name: Commit formatting and remove this workflow
        run: |
          rm .github/workflows/format-local-range.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes."
            exit 0
          fi
          git commit -m "style: format local range extraction"
          git push origin HEAD:agent/local-range-extraction
