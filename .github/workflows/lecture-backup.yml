name: Streaming Lecture Backup

on:
  push:
    branches:
      - main
      - agent/p1-010c3-streaming-lecture-backup-20260717
  pull_request:

concurrency:
  group: lecture-backup-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lecture-backup:
    name: Contract, eval, types, lint, build and browser proof
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify streaming lecture backup contract
        run: npm run verify:lecture-backup-contract

      - name: Run streaming lecture backup evaluations
        run: npm run eval:lecture-backup

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        id: lecture_backup_lint
        continue-on-error: true
        run: npm run lint > lecture-backup-lint.txt 2>&1

      - name: Upload lecture backup lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lecture-backup-lint-diagnostics
          path: lecture-backup-lint.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when lecture backup lint fails
        if: steps.lecture_backup_lint.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm run build

      - name: Run streaming lecture backup Chromium proof
        id: lecture_backup_browser
        continue-on-error: true
        run: npm run e2e:lecture-backup > lecture-backup-browser.txt 2>&1

      - name: Upload lecture backup browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lecture-backup-browser-diagnostics
          path: lecture-backup-browser.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when lecture backup Chromium proof fails
        if: steps.lecture_backup_browser.outcome == 'failure'
        run: exit 1
