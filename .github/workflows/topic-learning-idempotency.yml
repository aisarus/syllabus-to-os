name: Topic Learning Idempotency

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: topic-learning-idempotency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Eval, types, build and clean browser persistence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Run deterministic topic learning evaluations
        run: node --experimental-strip-types scripts/run-topic-learning-slice-evals.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build > topic-learning-build-output.txt 2>&1

      - name: Run topic learning browser E2E
        run: node scripts/run-topic-learning-slice-browser-e2e.mjs 2>&1 | tee topic-learning-browser-output.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topic-learning-idempotency-diagnostics
          path: |
            topic-learning-build-output.txt
            topic-learning-browser-output.txt
          if-no-files-found: ignore
          retention-days: 7
