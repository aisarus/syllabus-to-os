name: Patch long media finalized-upload boundary

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Limit destructive cleanup to failed storage
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/routes/app.lecture-media.tsx')
          text = path.read_text()
          old = '''    let uploadSucceeded = false;
    try {
      const manifest = await putLongMediaFile(material.id, file, {
        signal: controller.signal,
        onProgress: setProgress,
      });
      const duration = await durationPromise;
      if (duration) await updateLongMediaDuration(material.id, duration);
      store.updateMaterial(material.id, {
        processingMessage: isRu
          ? "Запись сохранена локально. Создай или импортируй расшифровку и подтверди source chunks."
          : "Recording saved locally. Create or import a transcript and approve source chunks.",
      });
      uploadSucceeded = true;
      toast.success(
        isRu
          ? `Лекция сохранена: ${manifest.chunkCount} локальных блоков`
          : `Lecture saved in ${manifest.chunkCount} local chunks`,
      );
    } catch (error) {
      await deleteLongMediaData(material.id).catch(() => undefined);
      store.deleteMaterial(material.id);
      if (error instanceof DOMException && error.name === "AbortError") {
        toast.info(
          isRu
            ? "Загрузка отменена. Неполная копия удалена."
            : "Upload cancelled. The incomplete copy was removed.",
        );
      } else {
        toast.error(error instanceof Error ? error.message : String(error));
      }
    } finally {
      abortRef.current = null;
      setBusy(false);
      setProgress(null);
    }

    if (!uploadSucceeded) return;
    try {
      await navigate({
        to: "/app/materials/$materialId",
        params: { materialId: material.id },
      });
    } catch {
      toast.warning(
        isRu
          ? "Лекция сохранена, но переход не открылся. Материал доступен в библиотеке."
          : "The lecture is saved, but its page did not open. It remains available in Materials.",
      );
    }
'''
          new = '''    let manifest;
    try {
      manifest = await putLongMediaFile(material.id, file, {
        signal: controller.signal,
        onProgress: setProgress,
      });
    } catch (error) {
      await deleteLongMediaData(material.id).catch(() => undefined);
      store.deleteMaterial(material.id);
      abortRef.current = null;
      setBusy(false);
      setProgress(null);
      if (error instanceof DOMException && error.name === "AbortError") {
        toast.info(
          isRu
            ? "Загрузка отменена. Неполная копия удалена."
            : "Upload cancelled. The incomplete copy was removed.",
        );
      } else {
        toast.error(error instanceof Error ? error.message : String(error));
      }
      return;
    }

    try {
      const duration = await durationPromise;
      if (duration) await updateLongMediaDuration(material.id, duration);
      store.updateMaterial(material.id, {
        processingMessage: isRu
          ? "Запись сохранена локально. Создай или импортируй расшифровку и подтверди source chunks."
          : "Recording saved locally. Create or import a transcript and approve source chunks.",
      });
      toast.success(
        isRu
          ? `Лекция сохранена: ${manifest.chunkCount} локальных блоков`
          : `Lecture saved in ${manifest.chunkCount} local chunks`,
      );
    } catch (finalizeError) {
      console.warn("Lecture media was stored, but optional metadata finalization failed.", finalizeError);
      toast.warning(
        isRu
          ? "Запись сохранена, но часть метаданных не обновилась."
          : "The recording is saved, but some optional metadata was not updated.",
      );
    } finally {
      abortRef.current = null;
      setBusy(false);
      setProgress(null);
    }

    try {
      await navigate({
        to: "/app/materials/$materialId",
        params: { materialId: material.id },
      });
    } catch {
      toast.warning(
        isRu
          ? "Лекция сохранена, но переход не открылся. Материал доступен в библиотеке."
          : "The lecture is saved, but its page did not open. It remains available in Materials.",
      );
    }
'''
          if old not in text:
              raise SystemExit('upload/finalization block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write src/routes/app.lecture-media.tsx
      - name: Strengthen contract
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-long-media-contract.mjs')
          text = path.read_text()
          text = text.replace('  "if (!uploadSucceeded) return",\n', '  "let manifest",\n  "optional metadata finalization failed",\n')
          path.write_text(text)
          PY
          npx prettier --write scripts/verify-long-media-contract.mjs
      - name: Commit and remove workflow
        run: |
          rm .github/workflows/patch-long-media-finalize-boundary.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/app.lecture-media.tsx scripts/verify-long-media-contract.mjs .github/workflows/patch-long-media-finalize-boundary.yml
          git commit -m "fix: never delete a committed lecture during finalization"
          git push origin HEAD:agent/long-lecture-media
