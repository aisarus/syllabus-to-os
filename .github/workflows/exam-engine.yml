name: Exam Engine

on:
  push:
    branches:
      - main
      - agent/exam-plan-v2
  pull_request:

concurrency:
  group: exam-engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-exam-planning:
    if: github.ref == 'refs/heads/agent/exam-plan-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exam-plan-v2
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Wire exam planning checks
        run: |
          npm pkg set 'scripts.verify:exam-planning-contract=node scripts/verify-exam-planning-contract.mjs'
          npm pkg set 'scripts.eval:exam-planning=node --experimental-strip-types scripts/run-exam-planning-evals.mjs'
          npm pkg set 'scripts.e2e:exam-planning=node scripts/run-exam-planning-browser-e2e.mjs'
          sed -i 's|src/components/exam-engine.tsx|src/routes/app.exam-engine.tsx|' scripts/verify-exam-planning-contract.mjs
          sed -i 's/const examEngine =/const route =/' scripts/verify-exam-planning-contract.mjs
          sed -i 's/examEngine.includes("ExamPlanningPanel")/route.includes("ExamPlanningPanel")/' scripts/verify-exam-planning-contract.mjs
          sed -i '/assert(docs.includes/d' scripts/verify-exam-planning-contract.mjs
          sed -i '/"verify:lecture-restore-contract",/a\  "verify:exam-planning-contract",' scripts/check.mjs
          sed -i '/"eval:lecture-restore",/a\  "eval:exam-planning",' scripts/check.mjs
      - name: Format exam planning slice
        run: npx prettier --write src/lib/exam-planning.ts src/lib/exam-planning-store.ts src/components/exam-planning-panel.tsx src/routes/app.exam-engine.tsx scripts/run-exam-planning-evals.mjs scripts/run-exam-planning-browser-e2e.mjs scripts/verify-exam-planning-contract.mjs docs/EXAM_PLANNING_V1.md package.json scripts/check.mjs
      - name: Verify exam planning contract
        run: npm run verify:exam-planning-contract
      - name: Run exam planning evaluations
        run: npm run eval:exam-planning
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run exam planning browser proof
        run: npm run e2e:exam-planning
      - name: Commit verified exam planning slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/exam-planning.ts src/lib/exam-planning-store.ts src/components/exam-planning-panel.tsx src/routes/app.exam-engine.tsx scripts/run-exam-planning-evals.mjs scripts/run-exam-planning-browser-e2e.mjs scripts/verify-exam-planning-contract.mjs docs/EXAM_PLANNING_V1.md package.json scripts/check.mjs
          git commit -m "feat: wire bounded exam planning"
          git push origin HEAD:agent/exam-plan-v2

  exam-engine:
    name: Contract, eval, build and browser proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify Exam Engine contract
        run: node scripts/verify-exam-engine-contract.mjs
      - name: Run Exam Engine evaluations
        run: node --experimental-strip-types scripts/run-exam-engine-evals.mjs
      - name: Verify exam planning contract
        run: npm run verify:exam-planning-contract
      - name: Run exam planning evaluations
        run: npm run eval:exam-planning
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run frozen Exam Engine browser proof
        run: node scripts/run-exam-engine-browser-e2e-final.mjs
      - name: Run exam planning browser proof
        run: npm run e2e:exam-planning
