name: Format resumable transcription slice

on:
  push:
    branches:
      - agent/resumable-long-transcription

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/resumable-long-transcription
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Format resumable transcription files
        run: |
          bunx prettier --write \
            scripts/verify-resumable-transcription-contract.mjs \
            src/components/long-media-data-boundary.tsx \
            src/components/resumable-transcription-panel.tsx \
            src/lib/resumable-transcription-store.ts \
            src/lib/resumable-transcription.ts
          rm .github/workflows/format-resumable-transcription.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/verify-resumable-transcription-contract.mjs \
            src/components/long-media-data-boundary.tsx \
            src/components/resumable-transcription-panel.tsx \
            src/lib/resumable-transcription-store.ts \
            src/lib/resumable-transcription.ts \
            .github/workflows/format-resumable-transcription.yml
          git commit -m "chore: format resumable transcription slice"
          git push origin HEAD:agent/resumable-long-transcription
