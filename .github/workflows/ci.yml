name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Contracts, types, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Verify project documentation
        run: npm run verify:docs

      - name: Verify selected-source AI contract
        run: npm run verify:ai-source-contract

      - name: Verify syllabus review contract
        run: npm run verify:syllabus-review-contract

      - name: Verify Course Workspace contract
        run: npm run verify:course-workspace-contract

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck-output.txt

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint 2>&1 | tee lint-output.txt

      - name: Build production bundle
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build-output.txt

      - name: Generate formatting patch after lint failure
        if: steps.lint.outcome == 'failure'
        run: |
          npm run format
          git diff -- . ':!bun.lock' > prettier-fix.patch

      - name: Upload failure diagnostics
        if: steps.typecheck.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            typecheck-output.txt
            lint-output.txt
            build-output.txt
            prettier-fix.patch
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail when quality gates fail
        if: steps.typecheck.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "One or more quality gates failed. Download the ci-diagnostics artifact for details."
          exit 1
