name: Patch long media commit boundary

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Separate committed upload from cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/long-media-store.ts')
          text = path.read_text()
          text = text.replace(
              '  let writtenBytes = 0;\n\n  try {',
              '  let writtenBytes = 0;\n  let committed = false;\n\n  try {',
              1,
          )
          old = '''    await writeRecord(db, MANIFEST_STORE, manifest);
    await deleteRecord(db, TRANSCRIPT_STORE, materialId);
    if (existing && existing.uploadId !== uploadId) {
      await deleteChunksForUpload(db, existing.uploadId);
    }
    return manifest;
  } catch (error) {
    await deleteChunksForUpload(db, uploadId).catch(() => undefined);
    throw error;
  }
'''
          new = '''    await writeRecord(db, MANIFEST_STORE, manifest);
    committed = true;
    try {
      await deleteRecord(db, TRANSCRIPT_STORE, materialId);
      if (existing && existing.uploadId !== uploadId) {
        await deleteChunksForUpload(db, existing.uploadId);
      }
    } catch (cleanupError) {
      console.warn("Lecture-media cleanup failed after commit; the new recording remains active.", cleanupError);
    }
    return manifest;
  } catch (error) {
    if (!committed) await deleteChunksForUpload(db, uploadId).catch(() => undefined);
    throw error;
  }
'''
          if old not in text:
              raise SystemExit('commit/cleanup block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write src/lib/long-media-store.ts
      - name: Strengthen contract
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-long-media-contract.mjs')
          text = path.read_text()
          marker = '  "existing.uploadId !== uploadId",\n'
          insertion = '  "existing.uploadId !== uploadId",\n  "let committed = false",\n  "cleanup failed after commit",\n  "if (!committed)",\n'
          if marker not in text:
              raise SystemExit('storage contract insertion point was not found')
          path.write_text(text.replace(marker, insertion, 1))
          PY
          npx prettier --write scripts/verify-long-media-contract.mjs
      - name: Commit and remove workflow
        run: |
          rm .github/workflows/patch-long-media-commit-boundary.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/long-media-store.ts scripts/verify-long-media-contract.mjs .github/workflows/patch-long-media-commit-boundary.yml
          git commit -m "fix: keep committed lecture uploads after cleanup errors"
          git push origin HEAD:agent/long-lecture-media
