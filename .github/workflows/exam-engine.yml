name: Exam Engine

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: exam-engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exam-engine:
    name: Contract, eval, build and browser proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify Exam Engine contract
        run: node scripts/verify-exam-engine-contract.mjs
      - name: Run Exam Engine evaluations
        run: node --experimental-strip-types scripts/run-exam-engine-evals.mjs
      - name: Verify exam planning contract
        run: npm run verify:exam-planning-contract
      - name: Run exam planning evaluations
        run: npm run eval:exam-planning
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: set -o pipefail; npm run typecheck 2>&1 | tee exam-engine-typecheck-output.txt
      - name: Upload Exam Engine typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: exam-engine-typecheck-diagnostics
          path: exam-engine-typecheck-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Fail when Exam Engine typecheck fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run Exam Engine browser E2E
        run: node scripts/run-exam-engine-browser-e2e-final.mjs
      - name: Run Exam Engine deep-link browser proof
        id: deep_link_browser
        continue-on-error: true
        run: node scripts/run-exam-deep-link-browser-e2e.mjs 2>&1 | tee exam-deep-link-browser-output.txt
      - name: Upload Exam Engine deep-link diagnostics
        if: steps.deep_link_browser.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: exam-deep-link-browser-diagnostics
          path: exam-deep-link-browser-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Fail when Exam Engine deep-link proof fails
        if: steps.deep_link_browser.outcome == 'failure'
        run: exit 1
      - name: Run Exam Engine result-review browser proof
        id: result_review_browser
        continue-on-error: true
        run: node scripts/run-exam-result-review-browser-e2e.mjs 2>&1 | tee exam-result-review-browser-output.txt
      - name: Upload Exam Engine result-review diagnostics
        if: steps.result_review_browser.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: exam-result-review-browser-diagnostics
          path: exam-result-review-browser-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Fail when Exam Engine result-review proof fails
        if: steps.result_review_browser.outcome == 'failure'
        run: exit 1
      - name: Run exam planning browser proof
        id: planning_browser
        continue-on-error: true
        run: npm run e2e:exam-planning 2>&1 | tee exam-planning-browser-output.txt
      - name: Upload exam planning browser diagnostics
        if: steps.planning_browser.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: exam-planning-browser-diagnostics
          path: exam-planning-browser-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Fail when exam planning browser proof fails
        if: steps.planning_browser.outcome == 'failure'
        run: exit 1
