name: Apply CourseWorkspace accessibility patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: s4-001-course-workspace-labels

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply and verify accessibility patch
        run: npm run fix:course-workspace-accessibility

      - name: Commit CourseWorkspace fix
        run: |
          if git diff --quiet -- src/components/course-workspace.tsx; then
            echo "CourseWorkspace accessibility patch is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/course-workspace.tsx
          git commit -m "fix(a11y): label and isolate CourseWorkspace content"
          git push origin HEAD:s4-001-course-workspace-labels
