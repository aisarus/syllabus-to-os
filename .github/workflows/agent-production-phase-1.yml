name: Agent production phase 1

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-production-phase-1-api.mjs
      - scripts/fix-production-phase-1-api-interpolation.mjs
      - .github/workflows/agent-production-phase-1.yml

permissions:
  contents: write

concurrency:
  group: agent-production-phase-1-api
  cancel-in-progress: false

jobs:
  api-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/production-phase-1-stabilization

      - name: Determine executor state
        id: guard
        shell: bash
        run: |
          message="$(git log -1 --pretty=%B)"
          if [[ "$message" == *"[phase1-api-generated]"* ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Generated API head detected; executor will not run again."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.run == 'true'
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: bun install --frozen-lockfile

      - name: Apply shared AI API policy
        if: steps.guard.outputs.run == 'true'
        run: |
          node scripts/fix-production-phase-1-api-interpolation.mjs
          node scripts/apply-production-phase-1-api.mjs
          npx prettier --write \
            package.json \
            scripts/apply-production-phase-1-api.mjs \
            scripts/fix-production-phase-1-api-interpolation.mjs \
            scripts/run-ai-route-policy-evals.mjs \
            scripts/verify-ai-route-policy-contract.mjs \
            src/lib/server/ai-generation.ts \
            src/lib/server/ai-route-policy.ts \
            src/lib/server/ai-route-schemas.ts \
            src/lib/server/gemini.ts \
            src/lib/server/ocr-generation.ts \
            src/routes/api/ai/*.ts

      - name: Verify API policy contract
        if: steps.guard.outputs.run == 'true'
        run: npm run verify:ai-route-policy-contract

      - name: Run API policy evaluations
        if: steps.guard.outputs.run == 'true'
        run: npm run eval:ai-route-policy

      - name: Typecheck
        if: steps.guard.outputs.run == 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.guard.outputs.run == 'true'
        run: npm run lint

      - name: Production build
        if: steps.guard.outputs.run == 'true'
        run: npm run build

      - name: Commit API hardening
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "Lamdan Production Agent"
          git config user.email "actions@users.noreply.github.com"
          git add package.json scripts/apply-production-phase-1-api.mjs scripts/fix-production-phase-1-api-interpolation.mjs scripts/run-ai-route-policy-evals.mjs scripts/verify-ai-route-policy-contract.mjs src/lib/server/ai-generation.ts src/lib/server/ai-route-policy.ts src/lib/server/ai-route-schemas.ts src/lib/server/gemini.ts src/lib/server/ocr-generation.ts src/routes/api/ai
          git commit -m "feat(api): add runtime schemas and bounded AI request policy [phase1-api-generated]"

      - name: Push verified API commit
        if: steps.guard.outputs.run == 'true'
        run: git push origin HEAD:agent/production-phase-1-stabilization
