name: Prepare streaming lecture backup slice

on:
  pull_request:
  push:
    branches:
      - agent/p1-010c3-streaming-lecture-backup-20260717

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-010c3-streaming-lecture-backup-20260717
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Add bounded IndexedDB accessors
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const mediaPath = 'src/lib/long-media-store.ts';
          let media = fs.readFileSync(mediaPath, 'utf8');
          if (!media.includes('export async function getLongMediaChunkRecord(')) {
            const anchor = `export async function listLongMediaManifests(): Promise<LongMediaManifest[]> {\n  const db = await openDatabase();\n  return readAll<LongMediaManifest>(db, MANIFEST_STORE);\n}\n`;
            if (!media.includes(anchor)) throw new Error('Missing long-media accessor anchor');
            media = media.replace(anchor, `${anchor}\nexport async function getLongMediaChunkRecord(\n  uploadId: string,\n  index: number,\n): Promise<LongMediaChunkRecord | undefined> {\n  if (!uploadId || !Number.isInteger(index) || index < 0) return undefined;\n  const db = await openDatabase();\n  return readRecord<LongMediaChunkRecord>(db, CHUNK_STORE, [uploadId, index]);\n}\n`);
            fs.writeFileSync(mediaPath, media);
          }

          const resumablePath = 'src/lib/resumable-transcription-store.ts';
          let resumable = fs.readFileSync(resumablePath, 'utf8');
          if (!resumable.includes('export async function getResumableRangeClip(')) {
            const anchor = `export async function listResumableRangeClips(\n  materialId: string,\n): Promise<ResumableRangeClipRecord[]> {`;
            if (!resumable.includes(anchor)) throw new Error('Missing range clip accessor anchor');
            resumable = resumable.replace(anchor, `export async function getResumableRangeClip(\n  materialId: string,\n  rangeId: string,\n): Promise<ResumableRangeClipRecord | undefined> {\n  if (!materialId || !rangeId) return undefined;\n  const db = await openDatabase();\n  return readRecord<ResumableRangeClipRecord>(db, CLIP_STORE, [materialId, rangeId]);\n}\n\n${anchor}`);
            fs.writeFileSync(resumablePath, resumable);
          }
          NODE

      - name: Format focused slice
        run: |
          npx prettier --write \
            src/lib/lecture-backup.ts \
            src/lib/long-media-store.ts \
            src/lib/resumable-transcription-store.ts \
            src/components/lecture-backup-panel.tsx \
            'src/routes/app.materials_.$materialId.tsx' \
            scripts/run-lecture-backup-evals.mjs \
            scripts/run-lecture-backup-browser-e2e.mjs \
            scripts/verify-lecture-backup-contract.mjs \
            scripts/check.mjs \
            package.json \
            docs/STREAMING_LECTURE_BACKUP.md \
            .github/workflows/lecture-backup.yml

      - name: Verify contract
        run: npm run verify:lecture-backup-contract

      - name: Run deterministic eval
        run: npm run eval:lecture-backup

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit store accessors and remove helper
        run: |
          rm .github/workflows/prepare-lecture-backup-slice.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add streaming lecture backup export"
          git push origin HEAD:agent/p1-010c3-streaming-lecture-backup-20260717
