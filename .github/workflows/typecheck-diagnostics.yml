name: Typecheck Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies quietly
        run: npm install --ignore-scripts --no-audit --no-fund --silent
      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          npm run typecheck > typecheck-output.txt 2>&1
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-media-typecheck-diagnostics
          path: typecheck-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail when TypeScript failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
