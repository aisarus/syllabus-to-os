name: Format orphan safety

on:
  push:
    branches:
      - agent/long-lecture-media

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/long-lecture-media
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx prettier --write src/components/long-media-lifecycle.tsx scripts/verify-long-media-contract.mjs
      - name: Commit and remove workflow
        run: |
          rm .github/workflows/format-orphan-safety.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/long-media-lifecycle.tsx scripts/verify-long-media-contract.mjs .github/workflows/format-orphan-safety.yml
          git commit -m "style: format confirmed orphan cleanup"
          git push origin HEAD:agent/long-lecture-media
