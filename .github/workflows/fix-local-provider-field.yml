name: Fix Local Provider Field

on:
  push:
    branches:
      - agent/local-range-extraction
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/local-range-extraction
          fetch-depth: 0

      - name: Fix provider status field
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/local-range-extraction-panel.tsx')
          text = path.read_text()
          old = 'providerStatus?.reason ??'
          if old not in text:
              raise SystemExit('Provider reason marker not found')
          path.write_text(text.replace(old, 'providerStatus?.error ??'))
          PY

      - name: Commit fix and remove this workflow
        run: |
          rm .github/workflows/fix-local-provider-field.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: use the configured transcription provider error"
          git push origin HEAD:agent/local-range-extraction
